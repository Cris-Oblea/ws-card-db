name: Deploy Pages

# CD: publishes the static lookup site (site/) to GitHub Pages.
# Mirrors tumatch's "auto-deploy on merge to main", adapted to a static site.
#
# GitHub Pages requires either a PUBLIC repo (free) or a paid plan for private
# repos. The repo went public 2026-07-22, so this now auto-deploys on every
# push to main (workflow_dispatch is kept too, for a manual re-deploy on demand).
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress publish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    name: Build artifact + deploy to Pages
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Configure Pages
        # enablement: turns Pages on (build type = GitHub Actions) if not already.
        uses: actions/configure-pages@v6
        with:
          enablement: true

      - name: Upload site artifact (site/ = the deployed web app)
        uses: actions/upload-pages-artifact@v5
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
