name: Deploy Pages

# CD: publishes the static lookup site (site/) to GitHub Pages.
# Mirrors tumatch's "auto-deploy on merge to main", adapted to a static site.
#
# GitHub Pages requires either a PUBLIC repo (free) or a paid plan for private
# repos. The repo went public 2026-07-22, so this now auto-deploys on every
# push to main (workflow_dispatch is kept too, for a manual re-deploy on demand).
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress publish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    name: Build artifact + deploy to Pages
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      # lfs: true resolves pipeline/cardlist_clean.json to its real content (not just the
      # pointer file) -- build_db.py needs the actual JSON to build the database.
      - uses: actions/checkout@v7
        with:
          lfs: true

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      # site/ws.sqlite.gz is NOT committed (see .gitignore) -- it's a ~10-13MB binary that
      # changes on every rebuild and doesn't delta-compress, so committing it repeatedly
      # bloated .git by hundreds of MB over time. Building it fresh here, every deploy,
      # keeps the git history clean while the live site always reflects the latest data +
      # cost model. build_db.py is stdlib-only, no pip install needed.
      - name: Build the site database
        run: python pipeline/build_db.py

      - name: Configure Pages
        # enablement: turns Pages on (build type = GitHub Actions) if not already.
        uses: actions/configure-pages@v6
        with:
          enablement: true

      - name: Upload site artifact (site/ = the deployed web app, DB just built above)
        uses: actions/upload-pages-artifact@v5
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
