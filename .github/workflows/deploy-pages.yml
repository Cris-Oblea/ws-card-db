name: Deploy Pages

# CD: publishes the static lookup site (docs/) to GitHub Pages.
# Mirrors tumatch's "auto-deploy on merge to main", adapted to a static site.
#
# ⚠️ PREREQUISITE: GitHub Pages requires either a PUBLIC repo (free) or a paid
# plan for private repos. This repo is private on the free plan, so this workflow
# is currently MANUAL-ONLY (workflow_dispatch) and will fail until the repo is
# public. When you make ws-card-db public, uncomment the `push` trigger below to
# auto-deploy on every merge to main.
on:
  # push:
  #   branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress publish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    name: Build artifact + deploy to Pages
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure Pages
        # enablement: turns Pages on (build type = GitHub Actions) if not already.
        uses: actions/configure-pages@v6
        with:
          enablement: true

      - name: Upload site artifact (docs/ = the deployed web app)
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
